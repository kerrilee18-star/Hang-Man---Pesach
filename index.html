<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalkboard Hangman</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --chalk: #f5f5f5;
            --board: #1e3a2f; /* Deep chalkboard green */
        }

        body {
            background-color: #162a22;
            background-image: url('https://www.transparenttextures.com/patterns/chalkboard.png');
            color: var(--chalk);
            font-family: 'Comic Sans MS', 'Verdana', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; touch-action: manipulation;
        }

        #game-container { width: 100%; max-width: 600px; text-align: center; }

        .header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        
        #canvas-container { margin: 10px 0; }
        canvas { 
            filter: blur(0.4px) drop-shadow(0px 0px 1px white); 
            border: 5px solid #5d4037; /* Wooden frame */
            background: var(--board);
            border-radius: 4px;
            width: 220px; height: 260px;
        }

        .word-display { font-size: 2.2rem; letter-spacing: 10px; margin: 15px 0; min-height: 3rem; text-transform: uppercase; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .translation-hint { font-size: 1rem; color: #a4b0be; margin-bottom: 10px; font-style: italic; }

        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; }
        .key { 
            background: rgba(255,255,255,0.1); border: 1.5px solid var(--chalk); color: var(--chalk); padding: 10px 2px; 
            font-size: 1.1rem; cursor: pointer; border-radius: 4px; transition: 0.1s;
        }
        .key:disabled { opacity: 0.2; cursor: default; }
        .key.correct { background: #27ae60; color: white; }
        .key.wrong { background: #c0392b; color: white; border-color: #c0392b; }

        #ui-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column;
        }
        .result-box { background: var(--board); padding: 30px; border: 4px solid #fff; border-radius: 15px; text-align: center; color: white; }
        .btn-next { background: #fff; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        
        .audio-icon-btn { 
            background: #f39c12; border: none; border-radius: 50%; 
            width: 60px; height: 60px; cursor: pointer; color: white; font-size: 24px; margin: 10px 0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <div>Round: <span id="round-num">1</span>/6</div>
            <div>Score: <span id="score">0</span></div>
        </div>

        <div id="canvas-container">
            <canvas id="hangman" width="220" height="260"></canvas>
        </div>

        <div class="word-display" id="word-slots"></div>
        <div class="translation-hint">Guess the word! / נחשו את המילה</div>

        <div id="keyboard" class="keyboard"></div>
    </div>

    <div id="ui-overlay">
        <div class="result-box">
            <h2 id="res-title">WELL DONE!</h2>
            <h1 id="res-word" style="letter-spacing: 3px; color: #f1c40f;"></h1>
            <h2 id="res-trans" style="color: #ecf0f1;"></h2>
            <button class="audio-icon-btn" onclick="playWordAudio()">🔊</button><br>
            <button class="btn-next" id="btn-action" onclick="nextRound()">Next Word / המילה הבאה</button>
        </div>
    </div>

    <script>
        const wordList = [
            { en: "FROG", he: "צפרדע" },
            { en: "BLOOD", he: "דם" },
            { en: "TABLE", he: "שולחן" },
            { en: "FOUR CUPS", he: "ארבע כוסות" },
            { en: "WINE", he: "יין" },
            { en: "SALT", he: "מלח" }
        ];

        let currentRound = 0, score = 0, mistakes = 0, guessedLetters = [], currentWord = "", currentTranslation = "", canPlay = true;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function initGame() {
            currentWord = wordList[currentRound].en;
            currentTranslation = wordList[currentRound].he;
            guessedLetters = []; mistakes = 0; canPlay = true;
            document.getElementById('round-num').innerText = currentRound + 1;
            document.getElementById('ui-overlay').style.display = 'none';
            drawGallows(); renderWord(); renderKeyboard();
        }

        function renderWord() {
            const display = currentWord.split('').map(letter => {
                if (letter === " ") return "&nbsp;&nbsp;";
                return guessedLetters.includes(letter) ? letter : "_";
            }).join(' ');
            document.getElementById('word-slots').innerHTML = display;
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = l;
                btn.onclick = () => handleGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (!canPlay) return;
            speak(letter); // Speaks ONLY the letter (no "capital")
            btn.disabled = true;

            if (currentWord.includes(letter)) {
                btn.classList.add('correct');
                guessedLetters.push(letter);
                renderWord();
                checkWin();
            } else {
                btn.classList.add('wrong');
                mistakes++;
                drawMan();
                if (mistakes >= 13) handleLoss();
            }
        }

        function checkWin() {
            const cleanWord = currentWord.replace(/\s/g, '');
            const allGuessed = cleanWord.split('').every(l => guessedLetters.includes(l));
            if (allGuessed) { score++; document.getElementById('score').innerText = score; showResult("EXCELLENT!", "כל הכבוד!"); }
        }

        function handleLoss() { showResult("TRY AGAIN", "לא נורא!"); }

        function showResult(title, sub) {
            canPlay = false;
            document.getElementById('ui-overlay').style.display = 'flex';
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-word').innerText = currentWord;
            document.getElementById('res-trans').innerText = currentTranslation;
            if(currentRound === 5) document.getElementById('btn-action').innerText = "See Final Score";
            setTimeout(() => speak(currentWord), 500);
        }

        function playWordAudio() { speak(currentWord); }

        function nextRound() {
            currentRound++;
            if (currentRound < 6) initGame();
            else showFinalScore();
        }

        function showFinalScore() {
            const overlay = document.getElementById('ui-overlay');
            overlay.innerHTML = `<div class="result-box"><h2>FINAL SCORE</h2><h1 style="font-size: 4rem;">${score}/6</h1><button class="btn-next" onclick="location.reload()">Restart Game</button></div>`;
            if(score > 3) confetti({ particleCount: 150, spread: 70 });
        }

        const canvas = document.getElementById('hangman');
        const ctx = canvas.getContext('2d');
        
        function drawGallows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.9)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.beginPath();
            // Static Gallows (always there)
            ctx.moveTo(20, 240); ctx.lineTo(100, 240); // Base
            ctx.moveTo(40, 240); ctx.lineTo(40, 20);   // Pole
            ctx.moveTo(40, 20); ctx.lineTo(140, 20);   // Top
            ctx.moveTo(140, 20); ctx.lineTo(140, 50);  // Rope
            ctx.stroke();
        }

        function drawMan() {
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            switch(mistakes) {
                case 1: ctx.arc(140, 70, 20, 0, Math.PI * 2); break; // Head
                case 2: ctx.moveTo(140, 90); ctx.lineTo(140, 160); break; // Body
                case 3: ctx.moveTo(140, 110); ctx.lineTo(110, 140); break; // L Arm
                case 4: ctx.moveTo(140, 110); ctx.lineTo(170, 140); break; // R Arm
                case 5: ctx.moveTo(140, 160); ctx.lineTo(115, 210); break; // L Leg
                case 6: ctx.moveTo(140, 160); ctx.lineTo(165, 210); break; // R Leg
                // Face elements (Extra chances)
                case 7: ctx.moveTo(132, 65); ctx.lineTo(134, 65); break; // L Eye
                case 8: ctx.moveTo(146, 65); ctx.lineTo(148, 65); break; // R Eye
                case 9: ctx.moveTo(140, 70); ctx.lineTo(140, 75); break; // Nose
                case 10: ctx.arc(140, 80, 5, 0, Math.PI); break;         // Mouth
                case 11: ctx.moveTo(110, 140); ctx.lineTo(105, 140); break; // Finger L
                case 12: ctx.moveTo(170, 140); ctx.lineTo(175, 140); break; // Finger R
                case 13: // Dead eyes X X
                    ctx.clearRect(130, 60, 20, 10);
                    ctx.moveTo(132, 62); ctx.lineTo(136, 68); ctx.moveTo(136, 62); ctx.lineTo(132, 68);
                    ctx.moveTo(144, 62); ctx.lineTo(148, 68); ctx.moveTo(148, 62); ctx.lineTo(144, 68);
                    break;
            }
            ctx.stroke();
        }

        initGame();
    </script>
</body>
</html>
